<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customizable Fabric-like Site</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .card {
            background-color: #161b22;
            border-radius: 10px;
            padding: 15px;
            text-decoration: none;
            color: #c9d1d9;
            width: 200px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover {
            background-color: #1f6feb;
        }
        .card img {
            width: 100%;
            border-radius: 5px;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #161b22;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="title">Custom Documentation</h1>
        <p id="subtitle">The official curated documentation for your project.</p>
    </header>
    <main>
        <div class="container" id="cards-container">
            <a href="page1.html" class="card">
                <img src="image1.jpg" alt="Image 1">
                <h2>Page 1</h2>
                <p>Description for Page 1.</p>
            </a>
            <a href="page2.html" class="card">
                <img src="image2.jpg" alt="Image 2">
                <h2>Page 2</h2>
                <p>Description for Page 2.</p>
            </a>
            <a href="page3.html" class="card">
                <img src="image3.jpg" alt="Image 3">
                <h2>Page 3</h2>
                <p>Description for Page 3.</p>
            </a>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 - Custom Documentation Team. Released under the <a href="#">Creative Commons license</a>.</p>
    </footer>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("title").innerText = "Customizable Site";
            document.getElementById("subtitle").innerText = "Easily modify this site to fit your needs.";
        });
    </script>
</body>
</html>
