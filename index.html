<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: url('https://img.freepik.com/free-photo/old-brown-paper-texture-background_1373-431.jpg') center/cover fixed;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }

        #slotMachine {
            background: #382218;
            padding: 30px;
            border-radius: 15px;
            border: 8px solid #543520;
            box-shadow: 0 0 30px #000000;
            max-width: 800px;
            width: 90%;
            margin-top: 2rem;
        }

        #moneyCounter {
            color: gold;
            font-size: 3rem;
            text-shadow: 2px 2px 4px #000000;
            margin: 20px;
            text-align: center;
        }

        .reels {
            display: flex;
            gap: 15px;
            padding: 30px;
            background: #654321;
            border-radius: 10px;
            justify-content: center;
        }

        .reel {
            width: 120px;
            height: 120px;
            border: 4px solid #543520;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            background: linear-gradient(145deg, #f0f0f0 0%, #d0d0d0 100%);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .reel[data-symbol="♠"], .reel[data-symbol="♣"] { color: #000; }
        .reel[data-symbol="♥"], .reel[data-symbol="♦"] { color: #ff0000; }
        .reel[data-symbol="7"] { color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }

        #controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        #betControls {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            font-size: 1.5rem;
        }

        #lever {
            width: 100px;
            height: 150px;
            background: linear-gradient(145deg, #a0a0a0 0%, #808080 100%);
            border: 6px solid #606060;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #lever:active, #lever.touch-active {
            transform: translateY(15px) scale(0.95);
        }

        .betButton {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #decreaseBet { background: #ff4444; }
        #increaseBet { background: #44ff44; }

        @media (max-width: 768px) {
            .reel {
                width: 80px;
                height: 80px;
                font-size: 3rem;
            }

            #lever {
                width: 80px;
                height: 120px;
            }

            #moneyCounter {
                font-size: 2rem;
            }

            #slotMachine {
                padding: 15px;
            }

            .reels {
                padding: 15px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="moneyCounter">₵50,000</div>
    <div id="slotMachine">
        <div class="reels">
            <div class="reel" id="reel1" data-symbol="♠">♠</div>
            <div class="reel" id="reel2" data="♥">♥</div>
            <div class="reel" id="reel3" data="♦">♦</div>
        </div>
        <div id="controls">
            <div id="betControls">
                <button class="betButton" id="decreaseBet">-</button>
                <div id="currentBet">₵2,000</div>
                <button class="betButton" id="increaseBet">+</button>
            </div>
            <div id="lever"></div>
        </div>
    </div>

    <script>
        let money = 50000;
        let currentBet = 2000;
        const symbols = ['♠', '♣', '♥', '♦', '7'];
        const spinSound = new Audio('spin.mp3');
        const winSound = new Audio('win.mp3');
        let isSpinning = false;

        // Mobile touch events
        const lever = document.getElementById('lever');
        lever.addEventListener('touchstart', handleLeverTouch);
        lever.addEventListener('click', spin);
        document.getElementById('increaseBet').addEventListener('click', () => changeBet(1000));
        document.getElementById('decreaseBet').addEventListener('click', () => changeBet(-1000));

        function handleLeverTouch(e) {
            e.preventDefault();
            lever.classList.add('touch-active');
            spin();
            setTimeout(() => lever.classList.remove('touch-active'), 200);
        }

        function changeBet(amount) {
            currentBet = Math.min(Math.max(currentBet + amount, 2000), 10000);
            document.getElementById('currentBet').textContent = `₵${currentBet.toLocaleString()}`;
        }

        function spin() {
            if (isSpinning || money < currentBet) return;

            isSpinning = true;
            money -= currentBet;
            updateMoney();
            spinSound.play().catch(() => {}); // Suppress mobile play errors

            const reels = document.querySelectorAll('.reel');
            let spinsCompleted = 0;

            reels.forEach((reel, index) => {
                let spins = 0;
                const spinInterval = setInterval(() => {
                    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                    reel.textContent = symbol;
                    reel.setAttribute('data-symbol', symbol);
                    spins++;
                    if (spins > 15 + (index * 5)) {
                        clearInterval(spinInterval);
                        if (++spinsCompleted === 3) {
                            checkWin();
                            isSpinning = false;
                        }
                    }
                }, 50);
            });
        }

        function checkWin() {
            const symbols = Array.from(document.querySelectorAll('.reel')).map(reel => reel.textContent);
            if (new Set(symbols).size === 1) {
                const winnings = currentBet * 5;
                money += winnings;
                updateMoney();
                winSound.play().catch(() => {});
                alert(`Jackpot! Won ₵${winnings.toLocaleString()}`);
            }
        }

        function updateMoney() {
            document.getElementById('moneyCounter').textContent = `₵${money.toLocaleString()}`;
        }
    </script>
</body>
</html>
