<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: url('https://img.freepik.com/free-photo/old-brown-paper-texture-background_1373-431.jpg');
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #slotMachine {
            background: #382218;
            padding: 20px;
            border-radius: 10px;
            border: 5px solid #543520;
            box-shadow: 0 0 20px #000000;
        }

        #moneyCounter {
            color: gold;
            font-size: 40px;
            text-shadow: 2px 2px 4px #000000;
            margin: 20px;
        }

        .reels {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: #654321;
            border-radius: 5px;
        }

        .reel {
            width: 100px;
            height: 100px;
            background: #f0f0f0;
            border: 3px solid #543520;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        #controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        #betControls {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 24px;
        }

        #lever {
            width: 80px;
            height: 120px;
            background: #c0c0c0;
            border: 5px solid #808080;
            border-radius: 10px;
            cursor: pointer;
            margin-left: 20px;
        }

        #lever:active {
            transform: translateY(10px);
        }

        .betButton {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        #decreaseBet {
            background: #ff4444;
        }

        #increaseBet {
            background: #44ff44;
        }
    </style>
</head>
<body>
    <div id="moneyCounter">₵50,000</div>
    <div id="slotMachine">
        <div class="reels">
            <div class="reel" id="reel1">♠</div>
            <div class="reel" id="reel2">♥</div>
            <div class="reel" id="reel3">♦</div>
        </div>
        <div id="controls">
            <div id="betControls">
                <button class="betButton" id="decreaseBet">-</button>
                <div id="currentBet">₵2,000</div>
                <button class="betButton" id="increaseBet">+</button>
            </div>
            <div id="lever"></div>
        </div>
    </div>

    <script>
        let money = 50000;
        let currentBet = 2000;
        const symbols = ['♠', '♣', '♥', '♦', '7'];
        const spinSound = new Audio('spin.mp3');
        const winSound = new Audio('win.mp3');
        let isSpinning = false;

        document.getElementById('lever').addEventListener('click', spin);
        document.getElementById('increaseBet').addEventListener('click', () => changeBet(1000));
        document.getElementById('decreaseBet').addEventListener('click', () => changeBet(-1000));

        function changeBet(amount) {
            currentBet = Math.min(Math.max(currentBet + amount, 2000), 10000);
            document.getElementById('currentBet').textContent = `₵${currentBet.toLocaleString()}`;
        }

        function spin() {
            if (isSpinning || money < currentBet) return;

            isSpinning = true;
            money -= currentBet;
            updateMoney();
            spinSound.play();

            const reels = document.querySelectorAll('.reel');
            let spinsCompleted = 0;

            reels.forEach((reel, index) => {
                let spins = 0;
                const spinInterval = setInterval(() => {
                    reel.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    spins++;
                    if (spins > 10 + (index * 5)) {
                        clearInterval(spinInterval);
                        spinsCompleted++;
                        if (spinsCompleted === 3) {
                            checkWin();
                            isSpinning = false;
                        }
                    }
                }, 50);
            });
        }

        function checkWin() {
            const symbols = Array.from(document.querySelectorAll('.reel')).map(reel => reel.textContent);
            if (new Set(symbols).size === 1) {
                const winnings = currentBet * 5;
                money += winnings;
                updateMoney();
                winSound.play();
                alert(`Jackpot! Won ₵${winnings.toLocaleString()}`);
            }
        }

        function updateMoney() {
            document.getElementById('moneyCounter').textContent = `₵${money.toLocaleString()}`;
        }
    </script>
</body>
</html>
