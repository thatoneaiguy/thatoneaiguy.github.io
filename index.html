<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aconite Studios</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            padding: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .card {
            background-color: #161b22;
            border-radius: 10px;
            padding: 15px;
            text-decoration: none;
            color: #c9d1d9;
            width: 200px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover {
            background-color: #1f6feb;
        }
        .card img {
            width: 100%;
            border-radius: 5px;
        }
        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #161b22;
        }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Site Logo" class="logo">
        <h1 id="title">Aconite Studios</h1>
        <p id="subtitle">Project wikis and information hub.</p>
    </header>
    <main>
        <div class="container" id="cards-container">
            <a href="discharged.html" class="card">
                <img src="discharged.png" alt="Discharged logo">
                <h2>Discharged</h2>
                <p>Natural Neutralisers.</p>
            </a>
            <a href="astray.html" class="card">
                <img src="astray.jpg" alt="Astray logo">
                <h2>Astray Archipelago</h2>
                <p>They're watching you.</p>
            </a>
            <a href="beaconated.html" class="card">
                <img src="beaconated.jpg" alt="Beaconated logo">
                <h2>Beaconated</h2>
                <p>Description for Page 3.</p>
            </a>
            <a href="carved.html" class="card">
                <img src="carved.jpg" alt="Carved logo">
                <h2>Carved</h2>
                <p>A Decor Mod based around new Trees!.</p>
            </a>
        </div>
    </main>
    <footer>
        <p>&copy; 2025 - Aconite Studios. Released under the Creative Commons license.</p>
    </footer>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById("title").innerText = "Aconite Studios";
            document.getElementById("subtitle").innerText = "Official documentation for Aconite's mods.";
        });
    </script>
</body>
</html>
